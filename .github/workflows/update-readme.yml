name: Update Profile README

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FEATURED_REPOS: >-
    https://github.com/jn-s3s/proxy-list,
    https://github.com/jn-s3s/continue-config,
    https://github.com/jn-s3s/netspeed-widget,
    https://github.com/jn-s3s/ublacklist-serpinfo

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate README
        run: python generate_readme.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update profile README with latest project info"
          git push
