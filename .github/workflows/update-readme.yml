name: Update Profile README

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch develop branch and generate README
        run: |
          git fetch -f origin develop:develop
          git checkout develop
          python generate_readme.py
          git add README.md
        env:
          FEATURED_REPOS: ${{ vars.FEATURED_REPOS }}

      - name: Commit and push to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git pull origin main
          git add README.md
          git commit -m "chore: update profile README with latest project info"
          git push origin main
